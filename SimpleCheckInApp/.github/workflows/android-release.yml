name: Android Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build debug APK
        run: ./gradlew :app:assembleDebug

      - name: Rename APK
        run: cp app/build/outputs/apk/debug/app-debug.apk "SimpleCheckInApp-${GITHUB_REF_NAME}-debug.apk"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "SimpleCheckInApp ${GITHUB_REF_NAME}"
          body: |
            - 修正热力图默认显示到今天，减少右侧空白
            - 增加状态栏安全间距并调整首页垂直布局
            - 在首页增加最近一次打卡、距离上次打卡、平均打卡间隔三项统计
          files: "SimpleCheckInApp-${GITHUB_REF_NAME}-debug.apk"
